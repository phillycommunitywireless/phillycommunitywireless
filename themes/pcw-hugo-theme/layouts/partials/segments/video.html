{{ $maxheight := "75vh" }}

<section class="cf {{ .class | default "bg-white" }}">

  <!-- header + text -->
  {{ with .header }}
  <div class="center ph3" style="max-width: calc({{ $maxheight }} * 1.7777777 - 4rem);">
    <h2 class="f2 {{ .class }}">
      {{ .text }}:
    </h2>  
  </div>
  {{ end }}

  <!-- textonly -->
  {{ with .text }}
    <div class="pv3 f3 tc center">{{ . }}</div>  
  {{ end }}
  
  <div class="center ph3" style="max-width: calc({{ $maxheight }} * 1.7777777 - 4rem);">
    <div class="aspect-ratio aspect-ratio--16x9">
      <iframe 
        width="560" 
        height="315"
        title="{{ .title | default $.Site.Title }}"
        class="absolute top-0 left-0 w-100 h-100"
        src="{{ .src }}?rel=0" 
        frameborder="0" 
        allow="accelerometer; clipboard-write; gyroscope; picture-in-picture" 
        allowfullscreen >
      </iframe>
    </div>
  </div>
</section>
